services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-azul_padel}
      POSTGRES_USER: ${POSTGRES_USER:-azul}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-azul} -d ${POSTGRES_DB:-azul_padel}']
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: build
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-azul}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:-azul_padel}
    command: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"

  api:
    build:
      context: .
      target: runtime
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-azul}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:-azul_padel}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-10}
    ports:
      - '${PORT:-3000}:3000'

volumes:
  postgres_data:
